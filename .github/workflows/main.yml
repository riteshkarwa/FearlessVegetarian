name: Run Cypress Test on Fearless Vegetarian Website
on:
 push:
   branches:
     - main
jobs:
 Cypress-Test:
   runs-on: ubuntu-24.04
   steps:
     - name: Checkout GitCode
       uses: actions/checkout@v6
     - uses: browser-actions/setup-chrome@v2
     - run: chrome --version
     - name: Cypress run
       uses: cypress-io/github-action@v7
       with:
         browser: chrome
